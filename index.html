<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniel Keliher</title>
  <!--<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>-->
  <link href="/static/css/styles.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark: #1a3a5c;
      --blue-mid:  #2563a8;
      --blue-bg:   #37538C;
      --white:     #ffffff;
      --text-dark: #1a1a2e;
      --text-mid:  #334155;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      line-height: 1.7;
    }

    section { padding: 60px 0; }
    section:nth-of-type(odd)  { background: var(--white); }
    section:nth-of-type(even) { background: var(--blue-bg); color: #fff; }
    section:nth-of-type(even) h2 { color: #fff; }
    section:nth-of-type(even) .section-intro,
    section:nth-of-type(even) .pub-list li,
    section:nth-of-type(even) .courses-list li,
    section:nth-of-type(even) .other-content { color: rgba(255,255,255,0.9); }
    section:nth-of-type(even) .pub-list li em { color: #fff; }
    section:nth-of-type(even) a { color: #b8d0ff; }
    section:nth-of-type(even) .course-code { color: #fff; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    h2 {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--blue-dark);
      margin-bottom: 1.25rem;
    }

    h3 {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--blue-dark);
      margin-bottom: 1.25rem;
    }

    /* ── BASIC INFO ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    .profile-name {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--blue-dark);
      margin-bottom: 0.2rem;
    }
    .profile-title {
      font-size: 0.95rem;
      color: var(--blue-mid);
      font-weight: 500;
      margin-bottom: 0.15rem;
    }
    .profile-affiliation {
      font-size: 0.9rem;
      color: var(--text-mid);
      margin-bottom: 1rem;
    }
    .profile-bio {
      font-size: 0.92rem;
      color: var(--text-mid);
      margin-bottom: 1.25rem;
    }
    .section-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
    }
    .section-links a {
      color: var(--blue-mid);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .section-links a:hover { border-bottom-color: var(--blue-mid); }

    /* ── RESEARCH ── */
    .section-intro {
      font-size: 0.92rem;
      color: var(--text-mid);
      margin-bottom: 1.25rem;
    }
    .pub-list {
      list-style: disc;
      padding-left: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .pub-list li {
      font-size: 0.92rem;
      color: var(--text-mid);
    }
    .pub-list li em { color: var(--text-dark); }
    .pub-list li a { color: var(--blue-mid); }

    /* ── TEACHING ── */
    .courses-list {
      list-style: disc;
      padding-left: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .courses-list li { font-size: 0.92rem; color: var(--text-mid); }
    .course-code { font-weight: 600; color: var(--text-dark); }

    /* ── OTHER ── */
    .other-content { font-size: 0.92rem; color: var(--text-mid); max-width: 620px; }
    .other-content p + p { margin-top: 0.9rem; }

    @media (max-width: 580px) {
      .profile-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  </style>
</head>
<body>

  <!-- BASIC INFO -->
  <section id="info">
    <div class="container">
      <div class="profile-grid">
        <div>
          <img src="dk.jpeg" alt="When it's noon on the moon, what time is it here?" style="width:170px;border-radius:10px;"> 
          <!--<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        -->
        </div>

        <div>
          <p class="profile-name">Daniel P. Keliher</p>
          <p class="profile-affiliation">keliher(at)mit.edu</p>
          <p class="profile-affiliation">dkeliher(at)middlebury(dot)edu</p>
          <div class="section-links">
            <a href="#about">About</a>
            <a href="#research">Research</a>
            <a href="cv.pdf">CV ↓</a>
          </div>
        </div>

      </div>
    </div>
  </section>


   <!-- ABOUT -->
  <section id="about">
    <div class="container">
      <h2>About</h2>
      <p>
        This webpage is under construction. Come back soon. 
      </p>
    </div>
  </section>

  <!-- RESEARCH -->
  <section id="research">
    <div class="container">
      <h2>Research</h2>
     For math, look at the <a href="https://arxiv.org/search/?query=Keliher%2C+Daniel&searchtype=author&abstracts=show&order=-announced_date_first&size=50"> arXiv </a>.
    </div>
  </section>



</body>
</html>
